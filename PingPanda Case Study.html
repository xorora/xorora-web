<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Xorora — Case Study · Real-Time SaaS Event Monitoring</title>
<link rel="stylesheet" href="colors_and_type.css">
<link rel="stylesheet" href="src/meganav.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  html, body { margin: 0; background: var(--surface); }
  * { box-sizing: border-box; }
  ::selection { background: var(--tangerine-500); color: #fff; }
  img { max-width: 100%; }

  /* tech-stack marquees */
  .cs-tmq-wrap { position: relative; -webkit-mask-image: linear-gradient(90deg, transparent, #000 7%, #000 93%, transparent); mask-image: linear-gradient(90deg, transparent, #000 7%, #000 93%, transparent); }
  .cs-tmq { display: flex; gap: 16px; width: max-content; }
  .cs-tmq-a { animation: csMarqA 46s linear infinite; }
  .cs-tmq-b { animation: csMarqB 52s linear infinite; }
  .cs-tmq-wrap:hover .cs-tmq { animation-play-state: paused; }
  @keyframes csMarqA { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  @keyframes csMarqB { from { transform: translateX(-50%); } to { transform: translateX(0); } }

  /* pipeline */
  .reg-pipeline { display: flex; align-items: stretch; gap: 8px; }
  .reg-pipe-arrow { display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

  /* responsive */
  @media (max-width: 980px) {
    .cs-header-grid, .cs-overview-grid, .cs-outcomes-grid, .cs-contact-grid, .cs-results-head { grid-template-columns: 1fr !important; }
    .cs-header-art { order: -1; }
    .cs-metrics-grid { grid-template-columns: 1fr 1fr !important; gap: 32px 28px !important; }
    .reg-pipeline { flex-wrap: wrap; }
    .reg-pipe-arrow { display: none !important; }
    .reg-pipeline > div { flex: 1 1 40% !important; }
    .reg-flow-down { height: 22px !important; }
  }
  @media (max-width: 720px) {
    .cs-navlinks { display: none !important; }
  }
  @media (max-width: 560px) {
    .cs-metrics-grid { grid-template-columns: 1fr !important; }
    .reg-arch-2col, .reg-arch-3col { grid-template-columns: 1fr !important; }
    .cs-outcome-cards { grid-template-columns: 1fr !important; }
    .reg-pipeline > div { flex: 1 1 100% !important; }
  }
  @media (prefers-reduced-motion: reduce) {
    .cs-tmq { animation: none !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="src/primitives.jsx"></script>
<script type="text/babel" src="src/geometry.jsx"></script>
<script type="text/babel" src="src/footer.jsx"></script>
<script type="text/babel" src="src/meganav-data.jsx"></script>
<script type="text/babel" src="src/letstalk-modal.jsx"></script>
<script type="text/babel" src="src/meganav.jsx"></script>
<script type="text/babel" src="cs/cs-lib.jsx"></script>
<script type="text/babel" src="pingpanda/pp-top.jsx"></script>
<script type="text/babel" src="pingpanda/pp-metrics.jsx"></script>
<script type="text/babel" src="pingpanda/pp-solution.jsx"></script>
<script type="text/babel" src="pingpanda/pp-architecture.jsx"></script>
<script type="text/babel" src="pingpanda/pp-tech.jsx"></script>
<script type="text/babel" src="pingpanda/pp-bottom.jsx"></script>
<script type="text/babel" src="pingpanda/pp-app.jsx"></script>
</body>
</html>
