<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  html, body { margin: 0; background: var(--navy-900); }
  * { box-sizing: border-box; }
  ::selection { background: var(--tangerine-500); color: #fff; }
  img { max-width: 100%; }
  @keyframes stFade { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }

  @media (max-width: 980px) {
    .st-header-grid, .st-2col { grid-template-columns: 1fr !important; }
    .st-3grid { grid-template-columns: 1fr 1fr !important; }
  }
  @media (max-width: 720px) {
    .cs-navlinks { display: none !important; }
    .st-2grid { grid-template-columns: 1fr !important; }
  }
  @media (max-width: 600px) {
    .st-3grid { grid-template-columns: 1fr !important; }
    .st-glass { order: -1; }
  }
</style>
</head>
