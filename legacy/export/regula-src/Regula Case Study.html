<style>
  html, body { margin: 0; background: var(--surface); }
  * { box-sizing: border-box; }
  ::selection { background: var(--tangerine-500); color: #fff; }
  img { max-width: 100%; }

  /* tech-stack marquees */
  .cs-tmq-wrap { position: relative; -webkit-mask-image: linear-gradient(90deg, transparent, #000 7%, #000 93%, transparent); mask-image: linear-gradient(90deg, transparent, #000 7%, #000 93%, transparent); }
  .cs-tmq { display: flex; gap: 16px; width: max-content; }
  .cs-tmq-a { animation: csMarqA 46s linear infinite; }
  .cs-tmq-b { animation: csMarqB 52s linear infinite; }
  .cs-tmq-wrap:hover .cs-tmq { animation-play-state: paused; }
  @keyframes csMarqA { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  @keyframes csMarqB { from { transform: translateX(-50%); } to { transform: translateX(0); } }

  /* pipeline */
  .reg-pipeline { display: flex; align-items: stretch; gap: 8px; }
  .reg-pipe-arrow { display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

  /* responsive */
  @media (max-width: 980px) {
    .cs-header-grid, .cs-overview-grid, .cs-outcomes-grid, .cs-contact-grid, .cs-results-head { grid-template-columns: 1fr !important; }
    .cs-header-art { order: -1; }
    .cs-metrics-grid { grid-template-columns: 1fr 1fr !important; gap: 32px 28px !important; }
    .reg-arch-4col { grid-template-columns: 1fr 1fr !important; }
    .reg-pipeline { flex-wrap: wrap; }
    .reg-pipe-arrow { display: none !important; }
    .reg-pipeline > div { flex: 1 1 40% !important; }
    .reg-flow-down { height: 22px !important; }
  }
  @media (max-width: 720px) {
    .cs-navlinks { display: none !important; }
  }
  @media (max-width: 560px) {
    .cs-metrics-grid { grid-template-columns: 1fr !important; }
    .reg-arch-2col, .reg-arch-3col, .reg-arch-4col { grid-template-columns: 1fr !important; }
    .cs-outcome-cards { grid-template-columns: 1fr !important; }
    .reg-pipeline > div { flex: 1 1 100% !important; }
  }
  @media (prefers-reduced-motion: reduce) {
    .cs-tmq { animation: none !important; }
  }
</style>
