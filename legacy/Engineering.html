<style>
  html, body { margin: 0; background: #02060F; }
  * { box-sizing: border-box; }
  ::selection { background: var(--tangerine-500); color: #fff; }
  img { max-width: 100%; }
  .eng-tmq-wrap { position: relative; -webkit-mask-image: linear-gradient(90deg, transparent, #000 7%, #000 93%, transparent); mask-image: linear-gradient(90deg, transparent, #000 7%, #000 93%, transparent); }
  .eng-tmq { display: flex; gap: 16px; width: max-content; }
  .eng-tmq-a { animation: engMarqA 46s linear infinite; }
  .eng-tmq-b { animation: engMarqB 52s linear infinite; }
  .eng-tmq-wrap:hover .eng-tmq { animation-play-state: paused; }
  @keyframes engMarqA { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  @keyframes engMarqB { from { transform: translateX(-50%); } to { transform: translateX(0); } }
  @media (prefers-reduced-motion: reduce) { .eng-tmq { animation: none !important; } }
  @media (max-width: 980px) {
    .eng-header-grid { grid-template-columns: 1fr !important; }
    .eng-glass { order: -1; }
    .eng-grid3, .eng-grid4 { grid-template-columns: 1fr 1fr !important; }
    .eng-contact-grid { grid-template-columns: 1fr !important; }
  }
  @media (max-width: 720px) { .cs-navlinks { display: none !important; } }
  @media (max-width: 560px) { .eng-grid3, .eng-grid4 { grid-template-columns: 1fr !important; } }
