<style>
  html, body { margin: 0; background: var(--navy-900); }
  * { box-sizing: border-box; }
  ::selection { background: var(--tangerine-500); color: #fff; }
  img { max-width: 100%; }

  .ind-reveal { opacity: 1; }
  .ind-reveal.in { animation: indReveal .7s cubic-bezier(.16,1,.3,1); }
  @keyframes indReveal { from { transform: translateY(18px); } to { transform: none; } }
  .ind-grid > .ind-reveal.in:nth-child(3n+2) { animation-delay: .07s; }
  .ind-grid > .ind-reveal.in:nth-child(3n+3) { animation-delay: .14s; }
  .ind-cases-grid > .ind-reveal.in:nth-child(2) { animation-delay: .08s; }
  .ind-cases-grid > .ind-reveal.in:nth-child(3) { animation-delay: .16s; }
  .ind-proc-grid > .ind-reveal.in:nth-child(2) { animation-delay: .07s; }
  .ind-proc-grid > .ind-reveal.in:nth-child(3) { animation-delay: .14s; }
  .ind-proc-grid > .ind-reveal.in:nth-child(4) { animation-delay: .21s; }
  @media (prefers-reduced-motion: reduce) { .ind-reveal.in { animation: none !important; } }

  @media (max-width: 980px) {
    .ind-grid, .ind-cases-grid, .ind-proc-grid { grid-template-columns: 1fr 1fr !important; }
    .ind-contact-grid { grid-template-columns: 1fr !important; }
  }
  @media (max-width: 720px) {
    .cs-navlinks { display: none !important; }
  }
  @media (max-width: 600px) {
    .ind-grid, .ind-cases-grid, .ind-proc-grid { grid-template-columns: 1fr !important; }
