<style>
  html, body { margin: 0; background: #02060F; }
  * { box-sizing: border-box; }
  ::selection { background: var(--tangerine-500); color: #fff; }
  img { max-width: 100%; }

  .v2-rise { animation: v2rise .7s cubic-bezier(.16,1,.3,1); }
  @keyframes v2rise { from { transform: translateY(22px); } to { transform: none; } }
  @media (prefers-reduced-motion: reduce) { .v2-rise { animation: none; } }

  /* liquid glass (adapted to navy register) */
  .lg { background: rgba(255,255,255,0.04); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); box-shadow: inset 0 1px 1px rgba(255,255,255,0.08); position: relative; overflow: hidden; }
  .lg::before { content: ''; position: absolute; inset: 0; border-radius: inherit; padding: 1.4px; background: linear-gradient(180deg, rgba(255,255,255,0.45) 0%, rgba(255,255,255,0.14) 20%, rgba(255,255,255,0) 42%, rgba(255,255,255,0) 58%, rgba(255,255,255,0.14) 80%, rgba(255,255,255,0.45) 100%); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; }
  .lg-strong { background: rgba(255,255,255,0.05); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); box-shadow: 0 4px 18px rgba(0,0,0,0.25), inset 0 1px 1px rgba(255,255,255,0.16); position: relative; overflow: hidden; }
  .lg-strong::before { content: ''; position: absolute; inset: 0; border-radius: inherit; padding: 1.4px; background: linear-gradient(180deg, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0.2) 20%, rgba(255,255,255,0) 42%, rgba(255,255,255,0) 58%, rgba(255,255,255,0.2) 80%, rgba(255,255,255,0.55) 100%); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; }

  @media (max-width: 960px) {
    .v2-chess { grid-template-columns: 1fr !important; }
    .v2-chess > div { order: 0 !important; }
    .v2-grid4 { grid-template-columns: 1fr 1fr !important; }
    .v2-grid3 { grid-template-columns: 1fr !important; }
  }
  @media (max-width: 720px) { .cs-navlinks { display: none !important; } }
  @media (max-width: 540px) { .v2-grid4 { grid-template-columns: 1fr !important; } }

  /* V2 new sections — responsive grids */
  @media (max-width: 1100px) {
    .v2-cases-grid { grid-template-columns: 1fr 1fr !important; }
  }
  @media (max-width: 900px) {
    .v2-svc-bento { grid-template-columns: 1fr 1fr !important; grid-auto-rows: auto !important; }
    .v2-svc-feat { grid-column: 1 / -1 !important; grid-row: auto !important; min-height: 320px !important; }
  }
  @media (max-width: 960px) {
    .v2-deliver-grid { grid-template-columns: 1fr !important; }
    .v2-deliver-visual { padding-bottom: 8px; }
    .v2-contact-grid { grid-template-columns: 1fr !important; }
    .v2-contact-grid > div:last-child { position: static !important; }
  }
  @media (max-width: 760px) {
    .v2-ind-grid { grid-template-columns: 1fr 1fr !important; }
    .v2-cases-grid { grid-template-columns: 1fr !important; }
    .v2-models-grid { grid-template-columns: 1fr !important; }
  }
  @media (max-width: 600px) {
    .v2-svc-bento { grid-template-columns: 1fr !important; }
  }
  @media (max-width: 480px) {
    .v2-ind-grid { grid-template-columns: 1fr !important; }
  }
</style>

<script type="text/babel" src="v2/v2-app.jsx"></script>
</body>
