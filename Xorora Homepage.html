<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Xorora — Reimagine your business with AI</title>
<link rel="stylesheet" href="colors_and_type.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  html, body { margin: 0; background: var(--navy-900); }
  #root { min-height: 100%; }
  * { box-sizing: border-box; }
  ::selection { background: var(--tangerine-500); color: #fff; }
  @keyframes xoFade { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }
  @keyframes xoReveal { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: none; } }
  .xo-reveal { animation: xoReveal .7s cubic-bezier(.16,1,.3,1) both; }

  /* services bento */
  .xo-bento { display: grid; grid-template-columns: repeat(4, 1fr); grid-auto-rows: minmax(212px, auto); gap: 22px; }
  .xo-bento-big  { grid-column: span 2; grid-row: span 2; }
  .xo-bento-wide { grid-column: span 2; grid-row: span 1; }
  .xo-bento-cell { grid-column: span 1; grid-row: span 1; }
  @media (max-width: 900px) {
    .xo-bento { grid-template-columns: 1fr 1fr; grid-auto-rows: minmax(200px, auto); }
    .xo-bento-big { grid-column: span 2; grid-row: span 1; }
    .xo-bento-wide { grid-column: span 2; }
  }
  @media (max-width: 560px) {
    .xo-bento { grid-template-columns: 1fr; }
    .xo-bento-big, .xo-bento-wide, .xo-bento-cell { grid-column: span 1; }
  }

  /* recognition marquee */
  .xo-marquee-wrap { position: relative; -webkit-mask-image: linear-gradient(90deg, transparent, #000 8%, #000 92%, transparent); mask-image: linear-gradient(90deg, transparent, #000 8%, #000 92%, transparent); }
  .xo-marquee { display: flex; width: max-content; animation: xoMarquee 38s linear infinite; }
  @keyframes xoMarquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .xo-marquee:hover { animation-play-state: paused; }

  .xo-logocloud { padding-top: 8px; }
  /* hero logo cloud */
  .xo-logo-marquee-wrap { position: relative; overflow: hidden; -webkit-mask-image: linear-gradient(90deg, transparent, #000 6%, #000 94%, transparent); mask-image: linear-gradient(90deg, transparent, #000 6%, #000 94%, transparent); }
  .xo-logo-marquee { display: flex; align-items: center; gap: 56px; width: max-content; animation: xoLogo 32s linear infinite; }
  @keyframes xoLogo { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  @media (max-width: 760px) {
    .xo-logocloud { flex-direction: column !important; gap: 16px !important; align-items: flex-start !important; }
    .xo-logocloud-divider { display: none !important; }
  }
  @media (prefers-reduced-motion: reduce) { .xo-logo-marquee { animation: none; } }

  @media (max-width: 860px) {
    .xo-spotlight { grid-template-columns: 1fr !important; }
  }
  @media (prefers-reduced-motion: reduce) {
    .xo-marquee { animation: none; }
  }

  @media (max-width: 1000px) {
    .xo-hero-grid { grid-template-columns: 1fr !important; }
    .xo-webinar-grid, .xo-playbook-grid, .xo-contact-grid,
    .xo-stats-head { grid-template-columns: 1fr !important; }
    .xo-webinar-grid > div:first-child { padding-bottom: 0 !important; }
    .xo-webinar-people { padding: 0 56px 48px !important; }
    .xo-footer-grid { grid-template-columns: 1fr 1fr !important; gap: 32px !important; }
    .xo-foot-news, .xo-foot-offices { grid-template-columns: 1fr !important; }
  }
  @media (max-width: 720px) {
    .xo-desktop-nav { display: none !important; }
    .xo-footer-grid { grid-template-columns: 1fr 1fr !important; }
    .xo-webinar-people { padding: 0 24px 32px !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="src/primitives.jsx"></script>
<script type="text/babel" src="src/geometry.jsx"></script>
<script type="text/babel" src="src/nav.jsx"></script>
<script type="text/babel" src="src/sections-top.jsx"></script>
<script type="text/babel" src="src/sections-mid.jsx"></script>
<script type="text/babel" src="src/sections-bottom.jsx"></script>
<script type="text/babel" src="src/footer.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
