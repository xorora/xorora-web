<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Industries We Serve | Xorora</title>
<meta name="description" content="Xorora builds custom software and AI for nine industries, from healthcare and fintech to travel and startups. Explore our work and start your project.">
<link rel="canonical" href="https://xorora.com/industries">
<link rel="stylesheet" href="colors_and_type.css">
<link rel="stylesheet" href="src/meganav.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  html, body { margin: 0; background: var(--navy-900); }
  * { box-sizing: border-box; }
  ::selection { background: var(--tangerine-500); color: #fff; }
  img { max-width: 100%; }

  .ind-reveal { opacity: 1; }
  .ind-reveal.in { animation: indReveal .7s cubic-bezier(.16,1,.3,1); }
  @keyframes indReveal { from { transform: translateY(18px); } to { transform: none; } }
  .ind-grid > .ind-reveal.in:nth-child(3n+2) { animation-delay: .07s; }
  .ind-grid > .ind-reveal.in:nth-child(3n+3) { animation-delay: .14s; }
  .ind-cases-grid > .ind-reveal.in:nth-child(2) { animation-delay: .08s; }
  .ind-cases-grid > .ind-reveal.in:nth-child(3) { animation-delay: .16s; }
  .ind-proc-grid > .ind-reveal.in:nth-child(2) { animation-delay: .07s; }
  .ind-proc-grid > .ind-reveal.in:nth-child(3) { animation-delay: .14s; }
  .ind-proc-grid > .ind-reveal.in:nth-child(4) { animation-delay: .21s; }
  @media (prefers-reduced-motion: reduce) { .ind-reveal.in { animation: none !important; } }

  @media (max-width: 980px) {
    .ind-grid, .ind-cases-grid, .ind-proc-grid { grid-template-columns: 1fr 1fr !important; }
    .ind-contact-grid { grid-template-columns: 1fr !important; }
  }
  @media (max-width: 720px) {
    .cs-navlinks { display: none !important; }
  }
  @media (max-width: 600px) {
    .ind-grid, .ind-cases-grid, .ind-proc-grid { grid-template-columns: 1fr !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="src/primitives.jsx"></script>
<script type="text/babel" src="src/geometry.jsx"></script>
<script type="text/babel" src="src/footer.jsx"></script>
<script type="text/babel" src="src/meganav-data.jsx"></script>
<script type="text/babel" src="src/letstalk-modal.jsx"></script>
<script type="text/babel" src="src/meganav.jsx"></script>
<script type="text/babel" src="cs/cs-lib.jsx"></script>
<script type="text/babel" src="industries/ind-top.jsx"></script>
<script type="text/babel" src="industries/ind-mid.jsx"></script>
<script type="text/babel" src="industries/ind-app.jsx"></script>
</body>
</html>
